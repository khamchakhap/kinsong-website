<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinsong | Clean. Conscious. Native.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #F4F6F0; /* Soft organic off-white matching the deck */
            color: #1C2D24; /* Deep forest wild green from the logo */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Georgia, Garamond, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            max-width: 650px;
            text-align: center;
            padding: 40px 24px;
        }
        /* Geometric, minimalist vector representation of the mountain/crescent logo */
        .logo-mark {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px auto;
            border: 3.5px solid #1C2D24;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-mark::before {
            content: '';
            position: absolute;
            bottom: 18px;
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom: 18px solid #1C2D24;
        }
        .logo-mark::after {
            content: '';
            position: absolute;
            top: 12px;
            right: 8px;
            width: 7px;
            height: 7px;
            background-color: #1C2D24;
            border-radius: 50%;
        }
        .brand-name {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #1C2D24;
        }
        .tagline {
            font-size: 0.95rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #4A6356;
            margin-bottom: 36px;
            font-weight: 500;
        }
        h1 {
            font-size: 2rem;
            font-weight: 400;
            line-height: 1.4;
            margin-bottom: 18px;
            font-family: Georgia, serif;
        }
        p {
            color: #4A6356;
            font-size: 1.1rem;
            line-height: 1.65;
            margin-bottom: 36px;
        }
        .treasures-preview {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 40px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #1C2D24;
            font-weight: 600;
        }
        .treasure-tag {
            background-color: rgba(28, 45, 36, 0.06);
            padding: 6px 14px;
            border-radius: 4px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        @media (min-width: 600px) {
            form {
                flex-direction: row;
                gap: 0;
            }
        }
        input[type="email"] {
            flex-grow: 1;
            background-color: #F4F6F0;
            border: 1.5px solid #1C2D24;
            color: #1C2D24;
            padding: 14px 18px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        @media (min-width: 600px) {
            input[type="email"] {
                border-right: none;
                border-radius: 4px 0 0 4px;
            }
        }
        button {
            background-color: #1C2D24;
            color: #F4F6F0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 14px 28px;
            border: 1.5px solid #1C2D24;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        @media (min-width: 600px) {
            button {
                border-radius: 0 4px 4px 0;
            }
        }
        button:hover {
            background-color: #2e473a;
            border-color: #2e473a;
        }
        .footer {
            margin-top: 64px;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            color: #7A9285;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Recreated Brand Logo Identity -->
        <div class="logo-mark"></div>
        <div class="brand-name">Kinsong</div>
        <div class="tagline">Clean. Conscious. Native.</div>
        
        <h1>Creating modern rituals with wild origins</h1>
        <p>Sourcing the pure essence of Northeast India to bridge the gap between the inaccessible wild and the conscious consumer.</p>
        
        <div class="treasures-preview">
            <span class="treasure-tag">Lakadong Turmeric</span>
            <span class="treasure-tag">Assam Tea</span>
            <span class="treasure-tag">Singpho Phalap</span>
        </div>

        <form onsubmit="alert('Thank you for joining the movement. We will reach out with private access soon.'); return false;">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Join the Movement</button>
        </form>

        <div class="footer">
            Authenticity from the Source &bull; hello@kinsong.com
        </div>
    </div>

</body>
</html>
