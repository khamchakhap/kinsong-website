<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinsong | Clean. Conscious. Native.</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #F4F6F0; /* Soft organic off-white matching the deck */
            color: #1C2D24; /* Deep forest wild green from the logo */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Georgia, Garamond, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            max-width: 650px;
            text-align: center;
            padding: 40px 24px;
        }
        .brand-name {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #1C2D24;
        }
        .tagline {
            font-size: 0.95rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #4A6356;
            margin-bottom: 36px;
            font-weight: 500;
        }
        h1 {
            font-size: 2rem;
            font-weight: 400;
            line-height: 1.4;
            margin-bottom: 18px;
            font-family: Georgia, serif;
        }
        p {
            color: #4A6356;
            font-size: 1.1rem;
            line-height: 1.65;
            margin-bottom: 36px;
        }
        .treasures-preview {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 40px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #1C2D24;
            font-weight: 600;
        }
        .treasure-tag {
            background-color: rgba(28, 45, 36, 0.06);
            padding: 6px 14px;
            border-radius: 4px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        @media (min-width: 600px) {
            form {
                flex-direction: row;
                gap: 0;
            }
        }
        input[type="email"] {
            flex-grow: 1;
            background-color: #F4F6F0;
            border: 1.5px solid #1C2D24;
            color: #1C2D24;
            padding: 14px 18px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        @media (min-width: 600px) {
            input[type="email"] {
                border-right: none;
                border-radius: 4px 0 0 4px;
            }
        }
        button {
            background-color: #1C2D24;
            color: #F4F6F0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 14px 28px;
            border: 1.5px solid #1C2D24;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        @media (min-width: 600px) {
            button {
                border-radius: 0 4px 4px 0;
            }
        }
        button:hover {
            background-color: #2e473a;
            border-color: #2e473a;
        }
        .footer {
            margin-top: 64px;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            color: #7A9285;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Recreated Brand Logo Mark from Deck (Pure Vector Code) -->
        <svg viewBox="0 0 200 200" width="90" height="90" style="margin: 0 auto 16px auto; display: block;">
            <!-- Outer crescent loop and tribal path configuration -->
            <path d="M 160 55 
                     A 75 75 0 1 0 100 175 
                     C 42 175, 45 122, 82 105 
                     A 45 45 0 1 1 160 95" 
                  fill="none" stroke="#1C2D24" stroke-width="7.5" stroke-linecap="round"/>
            
            <!-- Inner ancestral mountain peaks -->
            <path d="M 68 122 L 92 90 L 110 110 L 130 85 L 148 122" 
                  fill="none" stroke="#1C2D24" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
            
            <!-- Signature native origin accent dot -->
            <circle cx="178" cy="68" r="8.5" fill="#1C2D24"/>
        </svg>

        <div class="brand-name">Kinsong</div>
        <div class="tagline">Clean. Conscious. Native.</div>
        
        <h1>Creating modern rituals with wild origins</h1>
        <p>Sourcing the pure essence of Northeast India to bridge the gap between the inaccessible wild and the conscious consumer. </p>
        
        <div class="treasures-preview">
            <span class="treasure-tag">Lakadong Turmeric</span>
            <span class="treasure-tag">Assam Tea</span>
            <span class="treasure-tag">Singpho Phalap</span>
        </div>

        <form onsubmit="alert('Thank you for joining the movement. We will reach out with private access soon.'); return false;">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Join the Movement</button>
        </form>

        <div class="footer">
            Authenticity from the Source &bull; hello@kinsong.com
        </div>
    </div>

</body>
</html>
